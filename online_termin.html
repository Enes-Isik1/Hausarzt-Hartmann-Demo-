<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online-Termin – Hausarztpraxis</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --navy: #0D2B45; --blue: #1B6CA8; --white: #FFFFFF;
    --off-white: #F6F8FA; --text: #1A2733; --text-muted: #5A6E7F; --border: rgba(13,43,69,0.1);
  }
  body { font-family: 'IBM Plex Sans', sans-serif; background: var(--off-white); color: var(--text); padding: 4rem 2rem; }
  .container { max-width: 650px; margin: 0 auto; background: var(--white); border: 1px solid var(--border); padding: 3rem; box-shadow: 0 4px 25px rgba(0,0,0,0.04); }
  .section-eyebrow { font-size: 0.68rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--blue); margin-bottom: 0.5rem; font-weight: 500; }
  h1 { font-family: 'Libre Baskerville', serif; font-size: 2rem; color: var(--navy); margin-bottom: 0.4rem; font-weight: 400; }
  .sub-text { font-size: 0.82rem; color: var(--text-muted); margin-bottom: 2rem; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .fg { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 1.2rem; }
  .fg label { font-size: 0.68rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); font-weight: 500; }
  .fg input, .fg select, .fg textarea { border: 1px solid var(--border); padding: 0.75rem 1rem; font-family: 'IBM Plex Sans', sans-serif; font-size: 0.88rem; color: var(--text); outline: none; background: var(--off-white); }
  .fg input:focus, .fg select:focus, .fg textarea:focus { border-color: var(--blue); background: var(--white); }
  .fg textarea { resize: vertical; min-height: 90px; }
  .privacy { font-size: 0.72rem; color: var(--text-muted); line-height: 1.6; margin: 1rem 0; }
  .privacy a { color: var(--blue); text-decoration: none; }
  .btn-submit { width: 100%; background: var(--blue); color: var(--white); border: none; padding: 1rem; font-family: 'IBM Plex Sans', sans-serif; font-size: 0.88rem; font-weight: 500; cursor: pointer; transition: background 0.2s; letter-spacing: 0.04em; }
  .btn-submit:hover { background: var(--navy); }
  .btn-back { display: inline-block; margin-top: 2rem; color: var(--blue); text-decoration: none; font-size: 0.85rem; font-weight: 500; }

	@media (max-width: 1024px) {

    /* Global Paddings reduzieren */
    .topbar, nav, .notice-bar, .leistungen, .team, .info-section, .appointment, .testimonials, .footer-main, .footer-bottom {
      padding-left: 1.5rem !important;
      padding-right: 1.5rem !important;
    }

    /* Topbar Anpassung */
    .topbar { flex-direction: column; text-align: center; gap: 0.5rem; padding-top: 0.6rem; padding-bottom: 0.6rem; }
    .topbar-right { flex-direction: column; gap: 0.4rem; align-items: center; }

    /* Hamburger Menu anzeigen */
    .menu-toggle { display: flex; }

    /* Navigationsleiste mobil umgestalten */
    nav { padding-top: 0.8rem; padding-bottom: 0.8rem; }
    .nav-links {
      position: absolute; top: 100%; left: 0; right: 0;
      background: var(--white); border-bottom: 1px solid var(--border);
      flex-direction: column; gap: 0; padding: 0;
      max-height: 0; overflow: hidden; opacity: 0;
      transition: all 0.35s ease-in-out; pointer-events: none;
      box-shadow: 0 10px 15px rgba(0,0,0,0.05);
    }
    .nav-links.active { max-height: 500px; opacity: 1; pointer-events: auto; }
    .nav-links li { border-bottom: 1px solid rgba(13,43,69,0.05); width: 100%; }
    .nav-links li a { padding: 1rem 1.5rem; display: block; font-size: 0.9rem; font-weight: 500; }
    
    /* Mobiles Dropdown */
    .dropdown-menu { position: static; transform: none !important; opacity: 1; visibility: visible; display: none; box-shadow: none; background: var(--off-white); padding: 0; margin: 0; border: none; border-top: 1px solid rgba(13,43,69,0.05); }
    .dropdown-menu.show { display: flex; }
    .dropdown-menu li a { padding-left: 2.5rem; }
    .nav-actions { display: none; } /* Standard-Buttons ausblenden für mobiles cleanes Design */

    /* Notice Bar zentrieren */
    .notice-bar { text-align: center; justify-content: center; font-size: 0.8rem; }

    /* Hero Sektion */
    .hero { grid-template-columns: 1fr; min-height: auto; }
    .hero-left { padding: 4rem 1.5rem; }
    .hero-title { font-size: 2rem; }
    .hero-ctas { flex-direction: column; gap: 0.8rem; }
    .btn-primary-lg, .btn-secondary-lg { width: 100%; }
    .hero-info-row { grid-template-columns: 1fr; gap: 1rem; margin-top: 2rem; padding-top: 1.5rem; }
    .hero-right { height: 300px; order: -1; } /* Bild nach oben auf dem Handy */
    .hero-card { left: 1.5rem; bottom: 1.5rem; right: 1.5rem; max-width: none; }

    /* Sektions-Header */
    .section-header { margin-bottom: 2.5rem; }
    .section-title { font-size: 1.6rem; }

    /* Raster-Strukturen auf einspaltig brechen */
    .leistungen-grid { grid-template-columns: 1fr; gap: 1.2rem; }
    .team-grid { grid-template-columns: 1fr; gap: 1.5rem; margin-top: 2.5rem; }
    .testi-grid { grid-template-columns: 1fr; gap: 1.2rem; margin-top: 2.5rem; }

    /* Praxis Sektion */
    .praxis { grid-template-columns: 1fr; }
    .praxis-content { padding: 4rem 1.5rem; }
    .praxis-facts { grid-template-columns: 1fr 1fr; gap: 1rem; }
    .praxis-image { height: 280px; }

    /* Info & Sprechzeiten */
    .info-section { grid-template-columns: 1fr; gap: 3rem; padding-top: 4rem; padding-bottom: 4rem; }
    .info-block h3 { margin-bottom: 1rem; }

    /* Termin Sektion */
    .appointment { grid-template-columns: 1fr; gap: 3rem; padding-top: 4rem; padding-bottom: 4rem; }
    .appt-form { padding: 1.5rem; }
    .form-row { grid-template-columns: 1fr; gap: 0; }

    /* Footer */
    .footer-main { grid-template-columns: 1fr; gap: 2rem; padding-top: 3rem; padding-bottom: 3rem; }
    .footer-bottom { flex-direction: column; text-align: center; gap: 1rem; padding-top: 1.5rem; padding-bottom: 1.5rem; }
    .footer-bottom-links { justify-content: center; gap: 1.5rem; }
  }

  /* Hamburger-Animation wenn aktiv */
  .menu-toggle.open span:nth-child(1) { transform: rotate(45deg) translate(6px, 6px); }
  .menu-toggle.open span:nth-child(2) { opacity: 0; }
  .menu-toggle.open span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }

</style>
</head>
<body>

<div class="container">
  <div class="section-eyebrow">Digitaler Service</div>
  <h1>Online-Termin</h1>
  <p class="sub-text">Fragen Sie hier Ihren Wunschtermin an. Felder mit * sind Pflichtfelder.</p>
  
  <form>
    <div class="form-row">
      <div class="fg"><label>Vorname *</label><input type="text" placeholder="Vorname"></div>
      <div class="fg"><label>Nachname *</label><input type="text" placeholder="Nachname"></div>
    </div>
    <div class="form-row">
      <div class="fg"><label>Geburtsdatum *</label><input type="date"></div>
      <div class="fg"><label>Telefonnummer *</label><input type="tel" placeholder="+49"></div>
    </div>
    <div class="fg"><label>E-Mail-Adresse</label><input type="email" placeholder="ihre@email.de"></div>
    <div class="fg"><label>Versicherung *</label>
      <select>
        <option>Gesetzlich versichert (GKV)</option>
        <option>Privat versichert (PKV)</option>
        <option>Selbstzahler / Sonstige</option>
      </select>
    </div>
    <div class="fg"><label>Grund des Besuchs *</label>
      <select>
        <option>Erstvorstellung als neuer Patient</option>
        <option>Akute Beschwerden</option>
        <option>Routine-Check-up / Vorsorge</option>
        <option>Impfung / Laboruntersuchung</option>
      </select>
    </div>
    <div class="fg"><label>Anmerkungen / Symptome</label><textarea placeholder="Optionale Hinweise zu Ihren Beschwerden..."></textarea></div>
    
    <p class="privacy">Mit Absenden dieses Formulars stimmen Sie der Verarbeitung Ihrer Daten gemäß unserer <a href="#">Datenschutzerklärung</a> zu.</p>
    <button type="submit" class="btn-submit">Terminanfrage senden →</button>
  </form>
  
  <a href="hausarzt.html" class="btn-back">← Zurück zur Startseite</a>
</div>

</body>
</html>
